name: Build app images

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "Dockerfile"
      - ".github/workflows/app.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: ${{ !github.event.release || startsWith(github.event.release.tag_name, 'core/') || startsWith(github.event.release.tag_name, 'web/') || startsWith(github.event.release.tag_name, 'api/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [web, api]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/promptkiddie-${{ matrix.target }}
          tags: |
            type=sha
            type=raw,value=latest
            type=match,pattern=\w+/v(.*),group=1,enable=${{ github.event_name == 'release' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
