name: Build attackbox image

on:
  push:
    branches: [main]
    paths:
      - "packages/tooling/**"
      - ".github/workflows/attackbox.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/promptkiddie-attackbox

jobs:
  build-and-push:
    if: ${{ !github.event.release || startsWith(github.event.release.tag_name, 'tooling-mcp-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest
            type=match,pattern=\w+-v(.*),group=1,enable=${{ github.event_name == 'release' }}

      - uses: docker/build-push-action@v6
        with:
          context: packages/tooling
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
