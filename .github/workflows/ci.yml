name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter @promptkiddie/core test
      - run: pnpm --filter @promptkiddie/api test
      - run: pnpm --filter @promptkiddie/supervisor test
