name: release

on:
  push:
    branches: [main]
    paths:
      - '.changeset/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check for changesets
        id: check
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null)" ]; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.has_changesets == 'true'
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install knope
        if: steps.check.outputs.has_changesets == 'true'
        uses: knope-dev/action@v2
        with:
          version: 0.23.0

      - name: Configure git
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run knope release
        if: steps.check.outputs.has_changesets == 'true'
        run: knope release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_changesets }}" = "true" ]; then
            echo "## Release complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Knope consumed changesets, bumped versions, and created GitHub releases." >> "$GITHUB_STEP_SUMMARY"
            echo "Downstream workflows (ratatosk, gleipnir, app images) triggered by release events." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No release" >> "$GITHUB_STEP_SUMMARY"
            echo "No pending changesets." >> "$GITHUB_STEP_SUMMARY"
          fi
