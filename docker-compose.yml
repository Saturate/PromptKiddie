# PromptKiddie v2: infrastructure services only.
# Agent and orchestrator containers are spawned dynamically via `pk spawn`.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptkiddie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-promptkiddie}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptkiddie}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # VPN sidecar (Linux only; on macOS/Colima, VPN runs in the VM via pk vpn up)
  vpn:
    build:
      context: .
      dockerfile: packages/containers/vpn/Dockerfile
    container_name: pk-vpn
    profiles: ["linux-vpn"]
    restart: unless-stopped
    environment:
      VPN_PROFILE: ${VPN_PROFILE:-}
    volumes:
      - ${PK_VPN_CONFIG:-./vpn}:/vpn:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - pk-network

  # Headless Chrome for browser automation
  browser:
    image: zenika/alpine-chrome:latest
    container_name: pk-browser
    restart: unless-stopped
    command: >
      --no-sandbox
      --disable-gpu
      --disable-dev-shm-usage
      --remote-debugging-address=0.0.0.0
      --remote-debugging-port=9222
      --headless
    ports:
      - "${PK_BROWSER_PORT:-9222}:9222"
    shm_size: "512m"
    networks:
      - pk-network

  # Gleipnir reverse shell relay
  # On macOS/Colima: pk-network routes through VM (VPN works via host routes)
  # On Linux with VPN sidecar: use profile linux-vpn-gleipnir to share VPN network
  gleipnir:
    build:
      context: packages/gleipnir
    container_name: pk-gleipnir
    restart: unless-stopped
    volumes:
      - gleipnir-sock:/tmp
      - ./engagements:/workspace/engagements
    ports:
      - "4444:4444"
    networks:
      - pk-network

  # Gleipnir variant that shares VPN sidecar network (Linux only)
  gleipnir-vpn:
    build:
      context: packages/gleipnir
    container_name: pk-gleipnir
    profiles: ["linux-vpn"]
    restart: unless-stopped
    network_mode: "service:vpn"
    volumes:
      - gleipnir-sock:/tmp
      - ./engagements:/workspace/engagements

  # x86_64 build sidecar (for ARM64 hosts, cross-compiling)
  builder-x86:
    platform: linux/amd64
    build:
      context: packages/tooling/images
      dockerfile: Dockerfile.builder-x86
    container_name: pk-builder-x86
    profiles: ["build"]
    volumes:
      - ./.build:/build
    command: tail -f /dev/null

  # Supervisor (event-driven playbook executor, one instance per active engagement)
  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
      target: supervisor
    container_name: pk-supervisor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-promptkiddie}:${POSTGRES_PASSWORD:-changeme_local_only}@pk-db:5432/${POSTGRES_DB:-promptkiddie}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./engagements:/workspace/engagements
    networks:
      - pk-network

  # --- App services (optional, for hosted/frontend use) ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: pk-web
    restart: unless-stopped
    profiles: ["hosted"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-promptkiddie}:${POSTGRES_PASSWORD:-changeme_local_only}@pk-db:5432/${POSTGRES_DB:-promptkiddie}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      PORT: "3100"
    networks:
      - pk-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: pk-api
    restart: unless-stopped
    profiles: ["hosted"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3200:3200"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-promptkiddie}:${POSTGRES_PASSWORD:-changeme_local_only}@pk-db:5432/${POSTGRES_DB:-promptkiddie}
      PK_API_SECRET: ${PK_API_SECRET:-}
      PK_API_PORT: "3200"
    networks:
      - pk-network

  # Orchestrator (Cartridge + pk CLI + supervisor in standby)
  orchestrator:
    build:
      context: .
      dockerfile: packages/containers/orchestrator/Dockerfile
    container_name: pk-orchestrator
    profiles: ["hosted"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PK_SSH_PORT:-2222}:22"
      - "${PK_TTYD_PORT:-7681}:7681"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-promptkiddie}:${POSTGRES_PASSWORD:-changeme_local_only}@pk-db:5432/${POSTGRES_DB:-promptkiddie}
      PK_CONTAINER: "1"
    volumes:
      - ./engagements:/workspace/engagements
      - ./vpn:/vpn:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pk-network

  # --- Test targets (optional) ---
  dvwa:
    image: vulnerables/web-dvwa
    container_name: pk-dvwa
    profiles: ["targets"]
    ports:
      - "4280:80"
    networks:
      - pk-network

  juice-shop:
    image: bkimminich/juice-shop
    container_name: pk-juice
    profiles: ["targets"]
    ports:
      - "4300:3000"
    networks:
      - pk-network

  adminer:
    image: adminer:latest
    container_name: pk-adminer
    profiles: ["dev"]
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - pk-network

networks:
  pk-network:
    name: pk-network
    driver: bridge

volumes:
  pgdata:
  gleipnir-sock:
