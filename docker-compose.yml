services:
  postgres:
    image: postgres:17-alpine
    container_name: promptkiddie-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptkiddie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-promptkiddie}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptkiddie}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Lightweight DB UI at http://localhost:8080 (until the real frontend lands in M2)
  adminer:
    image: adminer:latest
    container_name: promptkiddie-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  pgdata:
