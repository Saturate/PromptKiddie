services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: promptkiddie-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptkiddie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-promptkiddie}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptkiddie}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Phase-specific attackboxes -------------------------------------------
  # Default: full image (Kali-based, everything). Override with PK_IMAGE=recon etc.

  attackbox:
    image: ghcr.io/saturate/promptkiddie-attackbox:latest
    build:
      context: packages/tooling/images
      dockerfile: Dockerfile.full
    container_name: promptkiddie-attackbox
    restart: unless-stopped
    ports:
      - "${PK_BROWSER_PORT:-9222}:9222"
      - "${PK_SOCKS_PORT:-1080}:1080"
    volumes:
      - ./engagements:/workspace/engagements
      - ${PK_VPN_CONFIG:-./vpn}:/vpn:ro
    cap_add:
      - NET_RAW
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.ip_forward=1

  # Headless Chrome sharing the attackbox network (routes through VPN)
  browser:
    image: zenika/alpine-chrome:latest
    container_name: promptkiddie-browser
    restart: unless-stopped
    network_mode: "service:attackbox"
    command: >
      --no-sandbox
      --disable-gpu
      --disable-dev-shm-usage
      --remote-debugging-address=0.0.0.0
      --remote-debugging-port=9222
      --headless
    shm_size: "512m"

  attackbox-recon:
    build:
      context: packages/tooling/images
      dockerfile: Dockerfile.recon
      args:
        BASE_IMAGE: pk-base
    container_name: promptkiddie-recon
    profiles: ["phase-containers"]
    restart: unless-stopped
    volumes:
      - ./engagements:/workspace/engagements
      - ${PK_VPN_CONFIG:-./vpn}:/vpn:ro
    cap_add:
      - NET_RAW
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0

  attackbox-attack:
    build:
      context: packages/tooling/images
      dockerfile: Dockerfile.attack
      args:
        BASE_IMAGE: pk-base
    container_name: promptkiddie-attack
    profiles: ["phase-containers"]
    restart: unless-stopped
    volumes:
      - ./engagements:/workspace/engagements
      - ${PK_VPN_CONFIG:-./vpn}:/vpn:ro
    cap_add:
      - NET_RAW
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0

  # --- Gleipnir relay (reverse shell handler) --------------------------------
  gleipnir:
    build:
      context: packages/gleipnir
    container_name: promptkiddie-gleipnir
    restart: unless-stopped
    network_mode: "service:attackbox"
    volumes:
      - gleipnir-sock:/tmp
      - ./engagements:/workspace/engagements

  # --- x86_64 build sidecar (for ARM64 hosts) ------------------------------
  # Only starts when explicitly invoked: docker compose --profile build up -d builder-x86
  builder-x86:
    platform: linux/amd64
    build:
      context: packages/tooling/images
      dockerfile: Dockerfile.builder-x86
    container_name: promptkiddie-builder-x86
    profiles: ["build"]
    volumes:
      - ./.build:/build
    command: tail -f /dev/null

  # --- App services (optional, for hosted deployment) ----------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: promptkiddie-web
    restart: unless-stopped
    profiles: ["hosted"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-promptkiddie}:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/${POSTGRES_DB:-promptkiddie}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      PORT: "3100"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: promptkiddie-api
    restart: unless-stopped
    profiles: ["hosted"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3200:3200"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-promptkiddie}:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/${POSTGRES_DB:-promptkiddie}
      PK_API_SECRET: ${PK_API_SECRET:-}
      PK_API_PORT: "3200"

  # --- Test targets (optional, for local testing) --------------------------
  dvwa:
    image: vulnerables/web-dvwa
    container_name: promptkiddie-dvwa
    profiles: ["targets"]
    ports:
      - "4280:80"

  juice-shop:
    image: bkimminich/juice-shop
    container_name: promptkiddie-juice
    profiles: ["targets"]
    ports:
      - "4300:3000"

  adminer:
    image: adminer:latest
    container_name: promptkiddie-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  pgdata:
  gleipnir-sock:
