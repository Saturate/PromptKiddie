[package]
name = "ratatosk"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Fast parallel privilege escalation scanner. Climbs to root."

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
walkdir = "2"
clap = { version = "4", features = ["derive"] }
glob = "0.3"

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.29", features = ["user", "fs", "process", "net"] }

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
